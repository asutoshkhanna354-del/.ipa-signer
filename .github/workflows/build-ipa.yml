name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies -project IPASigner.xcodeproj -scheme IPASigner
      - name: Build archive
        run: |
          xcodebuild archive -project IPASigner.xcodeproj -scheme IPASigner -configuration Release -destination "generic/platform=iOS" -archivePath ../build/IPASigner.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" AD_HOC_CODE_SIGNING_ALLOWED=YES
      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/IPASigner.xcarchive/Products/Applications/IPASigner.app build/Payload/
          cd build && zip -r IPASigner.ipa Payload/
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IPASigner-unsigned
          path: build/IPASigner.ipa
          retention-days: 30
