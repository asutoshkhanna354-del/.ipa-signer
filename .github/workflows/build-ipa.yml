name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project IPASigner.xcodeproj \
            -scheme IPASigner

      - name: Build archive
        run: |
          xcodebuild archive \
            -project IPASigner.xcodeproj \
            -scheme IPASigner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/IPASigner.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Show Swift errors
        if: failure()
        run: |
          echo "=== SWIFT ERRORS ==="
          grep -E "\.swift:[0-9]+.*error:" /tmp/build.log || echo "No .swift errors found"
          echo "=== LINKER/OTHER ERRORS ==="
          grep -E "^.*error:" /tmp/build.log | grep -v "^note:\|^warning:" | tail -20 || true

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/IPASigner.xcarchive/Products/Applications/IPASigner.app" \
            "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r IPASigner.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IPASigner-unsigned
          path: ${{ runner.temp }}/IPASigner.ipa
          retention-days: 30
