name: IPASigner
  options:
    bundleIdPrefix: com.ipasigner
    deploymentTarget:
      iOS: "17.0"
    xcodeVersion: "16.2"

  packages:
    ZIPFoundation:
      url: https://github.com/weichsel/ZIPFoundation.git
      from: 0.9.19

  targets:
    IPASigner:
      type: application
      platform: iOS
      deploymentTarget: "17.0"
      sources:
        - path: IPASigner
          excludes:
            - "Resources/Info.plist"
      info:
        path: IPASigner/Resources/Info.plist
        properties:
          CFBundleDisplayName: VaultSign
          CFBundleName: VaultSign
          CFBundleShortVersionString: "1.0"
          CFBundleVersion: "1"
      settings:
        base:
          PRODUCT_BUNDLE_IDENTIFIER: com.ipasigner.app
          SWIFT_VERSION: "5.9"
          TARGETED_DEVICE_FAMILY: "1,2"
      dependencies:
        - package: ZIPFoundation

  schemes:
    IPASigner:
      build:
        targets:
          IPASigner: all
      archive:
        config: Release
  