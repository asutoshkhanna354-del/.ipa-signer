name: IPASigner
options:
  bundleIdPrefix: com.ipasigner
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19

targets:
  IPASigner:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: IPASigner
        excludes:
          - "Resources/Info.plist"
    info:
      path: IPASigner/Resources/Info.plist
      properties:
        CFBundleDisplayName: VaultSign
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSLocalNetworkUsageDescription: VaultSign uses local networking to host signed IPAs for OTA installation.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportsDocumentBrowser: true
        NSBonjourServices:
          - _ipasigner._tcp
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ipasigner.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: NO
        INSTALL_PATH: /Applications
    dependencies:
      - package: ZIPFoundation

schemes:
  IPASigner:
    build:
      targets:
        IPASigner:
          run: true
          test: false
          profile: true
          analyze: true
          archive: true
    run:
      config: Debug
    archive:
      config: Release
