name: IPASigner
options:
  bundleIdPrefix: com.ipasigner
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  postGenCommand: "sudo install -m 755 scripts/xcodebuild-wrapper /usr/local/bin/xcodebuild && (/Applications/Xcode_16.2.app/Contents/Developer/usr/bin/xcodebuild -showsdks 2>/dev/null | grep -q iphoneos18.2 && echo 'iOS 18.2 already installed' || sudo /Applications/Xcode_16.2.app/Contents/Developer/usr/bin/xcodebuild -downloadPlatform iOS)"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19

targets:
  IPASigner:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: IPASigner
        excludes:
          - "Resources/Info.plist"
    info:
      path: IPASigner/Resources/Info.plist
      properties:
        CFBundleDisplayName: THE IPA STORE
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSLocalNetworkUsageDescription: THE IPA STORE uses local networking.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSBonjourServices:
          - _ipasigner._tcp
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ipasigner.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: NO
        INSTALL_PATH: /Applications
    dependencies:
      - package: ZIPFoundation
        link: static

schemes:
  IPASigner:
    build:
      targets:
        IPASigner:
          run: true
          test: false
          profile: true
          analyze: true
          archive: true
    run:
      config: Debug
    archive:
      config: Release
