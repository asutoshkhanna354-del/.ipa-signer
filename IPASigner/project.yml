name: IPASigner
options:
  bundleIdPrefix: com.ipasigner
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.4"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19

targets:
  IPASigner:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: IPASigner
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ipasigner.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_BITCODE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: IPASigner/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: ZIPFoundation

schemes:
  IPASigner:
    build:
      targets:
        IPASigner: all
    archive:
      config: Release
